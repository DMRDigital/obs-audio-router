name: Build obs-audio-router

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout plugin source
      # ----------------------------------------------------------------
      - name: Checkout plugin
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Clone OBS source for headers (shallow, no submodules)
      #    We only need the headers from libobs/ — not the full build
      # ----------------------------------------------------------------
      - name: Get OBS headers
        shell: pwsh
        run: |
          git clone --depth 1 --branch 32.1.2 `
            https://github.com/obsproject/obs-studio.git obs-src
          Write-Host "OBS source cloned."
          Write-Host "libobs contents:"
          Get-ChildItem obs-src/libobs | Select-Object Name

      # ----------------------------------------------------------------
      # 3. Download the OBS Windows zip to get obs.lib
      # ----------------------------------------------------------------
      - name: Download OBS Windows zip (for obs.lib)
        shell: pwsh
        run: |
          $version = "32.1.2"
          $url = "https://github.com/obsproject/obs-studio/releases/download/${version}/OBS-Studio-${version}-Windows-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile obs.zip
          Expand-Archive obs.zip -DestinationPath obs-bin
          Write-Host "OBS bin extracted. Looking for obs.lib:"
          Get-ChildItem -Recurse -Filter "obs.lib" obs-bin | Select-Object FullName

      # ----------------------------------------------------------------
      # 4. Configure CMake
      # ----------------------------------------------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          $obs_include = "${{ github.workspace }}\obs-src\libobs"
          Write-Host "OBS include dir: $obs_include"

          $lib = Get-ChildItem -Recurse -Filter "obs.lib" obs-bin | Select-Object -First 1
          $obs_lib = if ($lib) { $lib.FullName } else { "" }
          Write-Host "obs.lib: $obs_lib"

          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DOBS_INCLUDE_DIR="$obs_include" `
            -DOBS_LIB_PATH="$obs_lib"

      # ----------------------------------------------------------------
      # 5. Build
      # ----------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # ----------------------------------------------------------------
      # 6. Package
      # ----------------------------------------------------------------
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\obs-plugins\64bit | Out-Null
          New-Item -ItemType Directory -Force -Path dist\data\obs-plugins\obs-audio-router | Out-Null
          Copy-Item build\Release\obs-audio-router.dll dist\obs-plugins\64bit\
          Set-Content dist\data\obs-plugins\obs-audio-router\en-US.ini "# obs-audio-router locale`n"
          Compress-Archive -Path dist\* -DestinationPath obs-audio-router-windows-x64.zip
          Write-Host "Package created."

      # ----------------------------------------------------------------
      # 7. Upload artifact
      # ----------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-audio-router-windows-x64
          path: obs-audio-router-windows-x64.zip
          retention-days: 30

      # ----------------------------------------------------------------
      # 8. Create GitHub Release on version tags
      # ----------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: obs-audio-router-windows-x64.zip
          generate_release_notes: true
