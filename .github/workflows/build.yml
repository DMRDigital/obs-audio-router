name: Build obs-audio-router

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout plugin source
      # ----------------------------------------------------------------
      - name: Checkout plugin
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Download OBS Studio Windows zip (contains headers + obs.lib)
      # ----------------------------------------------------------------
      - name: Download OBS development files
        shell: pwsh
        run: |
          $version = "32.1.2"
          $url = "https://github.com/obsproject/obs-studio/releases/download/${version}/OBS-Studio-${version}-Windows-x64.zip"
          Write-Host "Downloading OBS $version ..."
          Invoke-WebRequest -Uri $url -OutFile obs.zip
          Expand-Archive obs.zip -DestinationPath obs-studio
          Write-Host "Extracted. Listing all files:"
          Get-ChildItem obs-studio -Recurse | Select-Object FullName

      # ----------------------------------------------------------------
      # 3. Configure CMake — find headers and obs.lib from extracted zip
      # ----------------------------------------------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          # Find obs-module.h — its parent is our include root
          $h = Get-ChildItem -Recurse -Filter "obs-module.h" obs-studio | Select-Object -First 1
          if (-not $h) { Write-Error "obs-module.h not found in OBS zip"; exit 1 }
          $obs_include = $h.DirectoryName
          Write-Host "Include dir: $obs_include"

          # Find obs.lib
          $lib = Get-ChildItem -Recurse -Filter "obs.lib" obs-studio | Select-Object -First 1
          $obs_lib = if ($lib) { $lib.FullName } else { "" }
          Write-Host "obs.lib: $obs_lib"

          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DOBS_INCLUDE_DIR="$obs_include" `
            -DOBS_LIB_PATH="$obs_lib"

      # ----------------------------------------------------------------
      # 4. Build
      # ----------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # ----------------------------------------------------------------
      # 5. Package the DLL
      # ----------------------------------------------------------------
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\obs-plugins\64bit | Out-Null
          New-Item -ItemType Directory -Force -Path dist\data\obs-plugins\obs-audio-router | Out-Null
          Copy-Item build\Release\obs-audio-router.dll dist\obs-plugins\64bit\
          Set-Content dist\data\obs-plugins\obs-audio-router\en-US.ini "# obs-audio-router locale`n"
          Compress-Archive -Path dist\* -DestinationPath obs-audio-router-windows-x64.zip
          Write-Host "Package created."

      # ----------------------------------------------------------------
      # 6. Upload artifact
      # ----------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-audio-router-windows-x64
          path: obs-audio-router-windows-x64.zip
          retention-days: 30

      # ----------------------------------------------------------------
      # 7. Create GitHub Release on version tags
      # ----------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: obs-audio-router-windows-x64.zip
          generate_release_notes: true
